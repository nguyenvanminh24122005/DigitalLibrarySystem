services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "127.0.0.1:1433:1433"
    networks:
      - digital-library-network
    restart: always

  catalog-service:
    build:
      context: ./catalog-service/CatalogService
      dockerfile: Dockerfile
    container_name: catalog-service
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=CatalogDB;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      ASPNETCORE_URLS: "http://+:5001"
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5001:5001"
    depends_on:
      - sqlserver
    networks:
      - digital-library-network
    restart: always

  circulation-service:
    build:
      context: ./circulation-service/CirculationService.Api
      dockerfile: Dockerfile
    container_name: circulation-service
    environment:
      ConnectionStrings__CirculationDb: "Server=sqlserver,1433;Database=CirculationDB;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      CATALOG_SERVICE_URL: "http://catalog-service:5001"
      IDENTITY_SERVICE_URL: "http://identity-report-service:5003"
      ASPNETCORE_URLS: "http://+:5002"
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5002:5002"
    depends_on:
      - sqlserver
    networks:
      - digital-library-network
    restart: always

  identity-report-service:
    build:
      context: ./identity-report-service
      dockerfile: Dockerfile
    container_name: identity-report-service
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=IdentityReportDB;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      ASPNETCORE_URLS: "http://+:5003"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      ServiceUrls__CatalogService: "http://catalog-service:5001"
      ServiceUrls__CirculationService: "http://circulation-service:5002"
    ports:
      - "5003:5003"
    depends_on:
      - sqlserver
    networks:
      - digital-library-network
    restart: always

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
      CATALOG_SERVICE_URL: "http://catalog-service:5001"
      CIRCULATION_SERVICE_URL: "http://circulation-service:5002"
      IDENTITY_SERVICE_URL: "http://identity-report-service:5003"
    ports:
      - "8080:8080"
    depends_on:
      - catalog-service
      - circulation-service
      - identity-report-service
    networks:
      - digital-library-network
    restart: always

  admin-frontend:
    build:
      context: ./frontend/digilib-admin-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: digilib-admin-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - digital-library-network
    restart: always

  librarian-frontend:
    build:
      context: ./frontend/digilib-librarian-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: digilib-librarian-frontend
    ports:
      - "5174:80"
    depends_on:
      - api-gateway
    networks:
      - digital-library-network
    restart: always

  user-frontend:
    build:
      context: ./frontend/digilib-user-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: digilib-user-frontend
    ports:
      - "5175:80"
    depends_on:
      - api-gateway
    networks:
      - digital-library-network
    restart: always

networks:
  digital-library-network:
    driver: bridge
