services:
  catalog-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: digilib-catalog-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123"
    ports:
      - "14331:1433"
    volumes:
      - catalog_data:/var/opt/mssql
    networks:
      - digilib-net
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  identity-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: digilib-identity-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123"
    ports:
      - "14332:1433"
    volumes:
      - identity_data:/var/opt/mssql
    networks:
      - digilib-net
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  circulation-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: digilib-circulation-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123"
    ports:
      - "14333:1433"
    volumes:
      - circulation_data:/var/opt/mssql
    networks:
      - digilib-net
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  catalog-service:
    build:
      context: ./src/Services/CatalogService
    container_name: digilib-catalog-service
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=catalog-db,1433;Database=CatalogDB;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False"
      Jwt__Secret: "THIS_IS_A_DEVELOPMENT_SECRET_KEY_FOR_DIGILIB_ADMIN_2024_MINIMUM_32_CHARS"
      Jwt__Issuer: "DIGILIB.Identity"
      Jwt__Audience: "DIGILIB.Services"
    depends_on:
      catalog-db:
        condition: service_healthy
    restart: on-failure
    ports:
      - "5101:8080"
    networks:
      - digilib-net

  identity-report-service:
    build:
      context: ./src/Services/IdentityReportService
    container_name: digilib-identity-report-service
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=identity-db,1433;Database=IdentityReportDB;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False"
      Jwt__Secret: "THIS_IS_A_DEVELOPMENT_SECRET_KEY_FOR_DIGILIB_ADMIN_2024_MINIMUM_32_CHARS"
      Jwt__Issuer: "DIGILIB.Identity"
      Jwt__Audience: "DIGILIB.Services"
      ServiceUrls__CatalogService: "http://catalog-service:8080"
      ServiceUrls__CirculationService: "http://circulation-service:8080"
    depends_on:
      identity-db:
        condition: service_healthy
    restart: on-failure
    ports:
      - "5102:8080"
    networks:
      - digilib-net

  circulation-service:
    build:
      context: ./src/Services/CirculationService
    container_name: digilib-circulation-service
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=circulation-db,1433;Database=CirculationDB;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False"
      Jwt__Secret: "THIS_IS_A_DEVELOPMENT_SECRET_KEY_FOR_DIGILIB_ADMIN_2024_MINIMUM_32_CHARS"
      Jwt__Issuer: "DIGILIB.Identity"
      Jwt__Audience: "DIGILIB.Services"
      ServiceUrls__CatalogService: "http://catalog-service:8080"
      ServiceUrls__IdentityReportService: "http://identity-report-service:8080"
      FinePerDay: "2000"
    depends_on:
      circulation-db:
        condition: service_healthy
    restart: on-failure
    ports:
      - "5103:8080"
    networks:
      - digilib-net

  api-gateway:
    build:
      context: ./src/ApiGateway
    container_name: digilib-api-gateway
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      Jwt__Secret: "THIS_IS_A_DEVELOPMENT_SECRET_KEY_FOR_DIGILIB_ADMIN_2024_MINIMUM_32_CHARS"
      Jwt__Issuer: "DIGILIB.Identity"
      Jwt__Audience: "DIGILIB.Services"
    depends_on:
      catalog-service:
        condition: service_started
      identity-report-service:
        condition: service_started
      circulation-service:
        condition: service_started
    restart: on-failure
    ports:
      - "5000:8080"
    networks:
      - digilib-net

  frontend:
    build:
      context: ./frontend/digilib-admin-frontend
      args:
        VITE_API_BASE_URL: "http://localhost:5000"
    container_name: digilib-admin-frontend
    environment:
      VITE_API_BASE_URL: "http://localhost:5000"
    depends_on:
      api-gateway:
        condition: service_started
    restart: on-failure
    ports:
      - "5173:80"
    networks:
      - digilib-net

  librarian-frontend:
    build:
      context: ./frontend/digilib-librarian-frontend
      args:
        VITE_API_BASE_URL: "http://localhost:5000"
    container_name: digilib-librarian-frontend
    environment:
      VITE_API_BASE_URL: "http://localhost:5000"
    depends_on:
      api-gateway:
        condition: service_started
    restart: on-failure
    ports:
      - "5174:80"
    networks:
      - digilib-net

  user-frontend:
    build:
      context: ./frontend/digilib-user-frontend
      args:
        VITE_API_BASE_URL: "http://localhost:5000"
    container_name: digilib-user-frontend
    environment:
      VITE_API_BASE_URL: "http://localhost:5000"
    depends_on:
      api-gateway:
        condition: service_started
    restart: on-failure
    ports:
      - "5175:80"
    networks:
      - digilib-net

volumes:
  catalog_data:
  identity_data:
  circulation_data:

networks:
  digilib-net:
    driver: bridge
