services:
  circulation-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - circulation_db_data_erdiagram:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_password123 -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  circulation-api:
    build:
      context: ./CirculationService.Api
      dockerfile: Dockerfile
    depends_on:
      circulation-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__CirculationDb: "Server=circulation-db,1433;Database=CirculationDB;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False"
      Jwt__Secret: "CHANGE_THIS_SHARED_SECRET_MINIMUM_32_CHARACTERS"
      Jwt__Issuer: "digital-library-identity-service"
      Jwt__Audience: "digital-library-api"
      Auth__DisableAuth: "true"
      Database__AutoCreate: "true"
      Database__SeedSampleData: "true"
    ports:
      - "5004:8080"

volumes:
  circulation_db_data_erdiagram:
    name: circulation_db_data_erdiagram
